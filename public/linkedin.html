        h1 { font-size: 21px; font-weight: 500 }
        h1 span:nth-of-type(1) { animation: t1 1.8s ease-in-out infinite }
        h1 span:nth-of-type(2) { animation: t2 1.8s ease-in-out infinite } 
        h1 span:nth-of-type(3) { animation: t3 1.8s ease-in-out infinite }
