<svg viewBox="0 0 800 20" xmlns="http://www.w3.org/2000/svg">
  <!-- @tmslpm - https://github.com/tmslpm - All Right Reserved -->
  <defs>
    <circle id="d1" fill="#aabfff" r="0.5" />
    <circle id="d2" fill="#aabfff" r="0.6" />
    <circle id="d3" fill="#aabfff" r="0.7" />
    <circle id="c1" fill="#ffffff" r="1.5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle id="c2" fill="#ffffff" r="1.8">
      <animate attributeName="opacity" values="1;0.2;1" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle id="c3" fill="#ffffff" r="1.6">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite" />
    </circle>
  </defs>
  <rect width="800" height="20" rx="6" fill="#1a1a2e" />
  <use href="#d2" x="40"  y="10" />
  <use href="#d1" x="80"  y="15" />
  <use href="#d3" x="140" y="5"  />
  <use href="#d2" x="220" y="12" />
  <use href="#d1" x="300" y="18" />
  <use href="#d3" x="380" y="8"  />
  <use href="#d2" x="460" y="14" />
  <use href="#d1" x="540" y="3"  />
  <use href="#d3" x="620" y="17" />
  <use href="#d2" x="700" y="7"  />
  <use href="#c1" x="150" y="11" />
  <use href="#c2" x="400" y="12" />
  <use href="#c3" x="680" y="6"  />
</svg>
