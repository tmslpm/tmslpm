<svg viewBox="0 0 800 140" xmlns="http://www.w3.org/2000/svg">
  <!-- @tmslpm - https://github.com/tmslpm - All Right Reserved -->
  <defs>
    <linearGradient id="sunset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9966" />
      <stop offset="100%" stop-color="#1a1a2e" />
    </linearGradient>
    <circle id="s1" fill="#ffffff" r="1.4" opacity="0.6">
      <animate attributeName="opacity" values="0;1;0.6" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle id="s2" fill="#ffffff" r="1.6" opacity="0.6">
      <animate attributeName="opacity" values="0;1;0.5" dur="6s" repeatCount="indefinite" />
    </circle>
  </defs>
  <rect width="800" height="140" rx="20" fill="url(#sunset)" />
  <use href="#s1" x="150" y="40" />
  <use href="#s2" x="500" y="60" />
  <circle cx="400" cy="100" r="30" fill="#ffcc70">
    <animate attributeName="cy" from="90" to="140" dur="6s" fill="freeze" />
  </circle>
</svg>
