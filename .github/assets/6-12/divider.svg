<svg viewBox="0 0 800 20" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.4" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect width="800" height="20" rx="6" ry="6" fill="#ff7e5f" />
  </g>
  <g fill="#ffffff" filter="url(#glow)" opacity="0.2">
    <circle cx="100" cy="5" r="1">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="300" cy="10" r="0.8">
      <animate attributeName="opacity" values="1;0.2;1" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="600" cy="15" r="1">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="7s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
