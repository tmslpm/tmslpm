<svg viewBox="0 0 800 20" xmlns="http://www.w3.org/2000/svg">
  <!-- @tmslpm - https://github.com/tmslpm - All Right Reserved -->
  <defs>
    <circle id="s1" fill="#ffffff" r="1" opacity="0.2">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle id="s2" fill="#ffffff" r="0.8" opacity="0.2">
      <animate attributeName="opacity" values="1;0.2;1" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle id="s3" fill="#ffffff" r="1" opacity="0.2">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="7s" repeatCount="indefinite" />
    </circle>
  </defs>
  <rect width="800" height="20" rx="6" ry="6" fill="#ff7e5f" />
  <use href="#s1" x="100" y="5"  />
  <use href="#s2" x="300" y="10" />
  <use href="#s3" x="600" y="15" />
</svg>
