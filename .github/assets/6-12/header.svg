<svg viewBox="0 0 800 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.4" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="sunrise" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0f2c" />
      <stop offset="99%" stop-color="#ff7e5f" />
    </linearGradient>
  </defs>
  <g filter="url(#shadow)">
    <rect width="800" height="140" rx="20" fill="url(#sunrise)" />
  </g>
  <g fill="#ffffff" filter="url(#glow)" opacity="0.3">
    <circle cx="100" cy="30" r="1">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="300" cy="60" r="0.8">
      <animate attributeName="opacity" values="1;0.2;1" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="600" cy="40" r="1">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="7s" repeatCount="indefinite" />
    </circle>
  </g>
  <circle cx="400" cy="120" r="40" fill="#fff3b0">
    <animate attributeName="cy" from="140" to="100" dur="6s" fill="freeze" />
  </circle>
</svg>
