<svg viewBox="0 0 800 20" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.4" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect width="800" height="20" rx="6" ry="6" fill="#03030a" />
  </g>
  <g fill="#aabfff">
    <circle cx="40" cy="10" r="0.6" />
    <circle cx="80" cy="15" r="0.5" />
    <circle cx="140" cy="5" r="0.7" />
    <circle cx="220" cy="12" r="0.6" />
    <circle cx="300" cy="18" r="0.5" />
    <circle cx="380" cy="8" r="0.7" />
    <circle cx="460" cy="14" r="0.6" />
    <circle cx="540" cy="3" r="0.5" />
    <circle cx="620" cy="17" r="0.7" />
    <circle cx="700" cy="7" r="0.6" />
  </g>
  <g fill="#ffffff" filter="url(#glow)">
    <circle cx="150" cy="11" r="1.5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="12" r="1.8">
      <animate attributeName="opacity" values="1;0.2;1" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="680" cy="6" r="1.6">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
