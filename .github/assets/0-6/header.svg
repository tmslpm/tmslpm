<svg viewBox="0 0 800 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.4" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect width="800" height="140" rx="20" ry="20" fill="#03030a" />
  </g>
  <g fill="#aabfff">
    <circle cx="40" cy="30" r="0.6" />
    <circle cx="80" cy="90" r="0.5" />
    <circle cx="140" cy="60" r="0.7" />
    <circle cx="220" cy="20" r="0.6" />
    <circle cx="300" cy="100" r="0.5" />
    <circle cx="380" cy="50" r="0.7" />
    <circle cx="460" cy="80" r="0.6" />
    <circle cx="540" cy="40" r="0.5" />
    <circle cx="620" cy="70" r="0.7" />
    <circle cx="700" cy="30" r="0.6" />
  </g>
  <g fill="#ffffff" filter="url(#glow)">
    <circle cx="150" cy="40" r="1.5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="90" r="1.8">
      <animate attributeName="opacity" values="1;0.2;1" dur="2.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="680" cy="60" r="1.6">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
